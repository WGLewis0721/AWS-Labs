---
schemaVersion: '2.2'
description: Download and run the TGW segmentation lab netcheck script on A1 Windows.
parameters:
  ScriptUrl:
    type: String
    description: S3 URL for the A1 netcheck PowerShell script.
    default: https://s3.amazonaws.com/terraform-lab-wgl/ssm/netcheck/a1/netcheck-a1.ps1
  LocalScriptPath:
    type: String
    description: Local file path on the instance where the netcheck script should be downloaded.
    default: C:\Temp\netcheck-a1.ps1
  ReportPath:
    type: String
    description: Path where the report should be written on the instance.
    default: C:\Temp\netcheck-a1-ssm.txt
  KeyPath:
    type: String
    description: Optional SSH key path if A1 should attempt SSH hostname checks.
    default: ''
mainSteps:
  - action: aws:downloadContent
    name: downloadA1Netcheck
    inputs:
      sourceType: S3
      sourceInfo: '{"path":"{{ ScriptUrl }}"}'
      destinationPath: '{{ LocalScriptPath }}'
  - action: aws:runPowerShellScript
    name: runA1Netcheck
    inputs:
      timeoutSeconds: '1800'
      runCommand:
        - '$ErrorActionPreference = "Stop"'
        - '$script = "{{ LocalScriptPath }}"'
        - 'if (-not (Test-Path $script)) { throw "Downloaded script not found at $script" }'
        - '& $script -ReportFile "{{ ReportPath }}" -KeyPath "{{ KeyPath }}"'
