---
schemaVersion: '2.2'
description: Download and run the TGW segmentation lab netcheck script on A2 Linux.
parameters:
  ScriptUrl:
    type: String
    description: S3 URL for the A2 netcheck shell script.
    default: https://s3.amazonaws.com/terraform-lab-wgl/ssm/netcheck/a2/netcheck.sh
  LocalScriptPath:
    type: String
    description: Local file path on the instance where the netcheck script should be downloaded.
    default: /tmp/netcheck.sh
  KeyPath:
    type: String
    description: Path to the lab SSH key on the instance for hop checks.
    default: /home/ec2-user/tgw-lab-key.pem
  ReportPath:
    type: String
    description: Path where the report should be written on the instance.
    default: /tmp/netcheck-a2-ssm.txt
mainSteps:
  - action: aws:downloadContent
    name: downloadA2Netcheck
    inputs:
      sourceType: S3
      sourceInfo: '{"path":"{{ ScriptUrl }}"}'
      destinationPath: '{{ LocalScriptPath }}'
  - action: aws:runShellScript
    name: runA2Netcheck
    inputs:
      timeoutSeconds: '1800'
      runCommand:
        - 'set -uo pipefail'
        - 'script="{{ LocalScriptPath }}"'
        - 'if [ ! -f "$script" ]; then echo "FAIL - Downloaded script not found at $script"; exit 1; fi'
        - 'chmod +x "$script"'
        - 'export KEY_PATH="{{ KeyPath }}"'
        - 'export REPORT_FILE="{{ ReportPath }}"'
        - 'bash "$script"'
